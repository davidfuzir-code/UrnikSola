<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Večtedenski urnik</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
            width: 60%;
            background: white;
        }

        th, td {
            border: 1px solid #333;
            padding: 15px;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Moji tedenski urniki</h1>

<div>
    <button onclick="prejsnji()">⬅ Prejšnji teden</button>
    <span id="tedenText"></span>
    <button onclick="naslednji()">Naslednji teden ➡</button>
</div>

<table>
    <tr>
        <th>Dan</th>
        <th>Datum</th>
        <th>Pouk</th>
    </tr>
    <tbody id="urnik"></tbody>
</table>

<script>
let teden = 1;

// ČETRTEK = 7.5.2026 (referenca)
const baseDate = new Date(2026, 4, 7); // meseci: 0=jan, 4=maj

const urniki = {
    1: [
        ["Ponedeljek", "Prosto"],
        ["Torek", "Prosto"],
        ["Sreda", "Prosto"],
        ["Četrtek", "Prosto"],
        ["Petek", "Prosto"],
        ["Sobota", "Prosto"],
        ["Nedelja", "Računalništvo,Astronomija"]
    ],
    2: [
        ["Ponedeljek", "Navadna Šola"],
        ["Torek", "Prosto"],
        ["Sreda", "Prosto"],
        ["Četrtek", "prosto"],
        ["Petek", "Astronomija"],
        ["Sobota", "Računalništvo"],
        ["Nedelja", "Navadna šola"]
    ]
};

const dneviIndex = {
    "Ponedeljek": -3,
    "Torek": -2,
    "Sreda": -1,
    "Četrtek": 0,
    "Petek": 1,
    "Sobota": 2,
    "Nedelja": 3
};

function formatDate(date) {
    return date.toLocaleDateString("sl-SI");
}

function prikazi() {
    document.getElementById("tedenText").innerText = "Teden " + teden;

    let tbody = document.getElementById("urnik");
    tbody.innerHTML = "";

    urniki[teden].forEach(vrstica => {
        let dan = vrstica[0];
        let offset = dneviIndex[dan] + (teden - 1) * 7;

        let datum = new Date(baseDate);
        datum.setDate(baseDate.getDate() + offset);

        let row = `
            <tr>
                <td>${dan}</td>
                <td>${formatDate(datum)}</td>
                <td>${vrstica[1]}</td>
            </tr>
        `;

        tbody.innerHTML += row;
    });
}

function naslednji() {
    if (teden < Object.keys(urniki).length) {
        teden++;
        prikazi();
    }
}

function prejsnji() {
    if (teden > 1) {
        teden--;
        prikazi();
    }
}

prikazi();
</script>

</body>
</html>
